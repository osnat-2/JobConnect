version: '3.8'

services:
  mongo:
    image: mongo:6.0
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD","mongosh","--quiet","--eval","db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres:
    image: postgres:15
    container_name: postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ats
    volumes:
      - pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD","pg_isready","-U","postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    ports:
      - "15672:15672" # management UI
      - "5672:5672"
    healthcheck:
      test: ["CMD","rabbitmqctl","status"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: redis
    healthcheck:
      test: ["CMD","redis-cli","ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  nginx:
    image: nginx:stable-alpine
    container_name: nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro

  job-service:
    build:
      context: .
      dockerfile: backend/src/services/JobService/JobService/Dockerfile
    container_name: job-service
    environment:
      - MONGO__CONNECTION=mongodb://mongo:27017/jobs
      - REDIS__HOST=redis
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy

  candidate-service:
    build:
      context: .
      dockerfile: backend/src/services/CandidateService/CandidateService/Dockerfile
    container_name: candidate-service
    environment:
      - POSTGRES__CONN=Host=postgres;Database=ats;Username=postgres;Password=postgres
    depends_on:
      postgres:
        condition: service_healthy

  application-service:
    build:
      context: .
      dockerfile: backend/src/services/ApplicationService/ApplicationService/Dockerfile
    container_name: application-service
    environment:
      - POSTGRES__CONN=Host=postgres;Database=ats;Username=postgres;Password=postgres
      - RABBITMQ__HOST=rabbitmq
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  bff:
    build:
      context: .
      dockerfile: backend/src/gateway/BFF/Dockerfile
    container_name: bff
    ports:
      - "8080:8080"
    depends_on:
      job-service:
        condition: service_started
      candidate-service:
        condition: service_started
      application-service:
        condition: service_started

  cv-parser:
    build:
      context: ./backend/src/workers
      dockerfile: CVParserWorker/Dockerfile
    container_name: cv-parser
    environment:
      - RABBITMQ__HOST=rabbitmq
      - CVPARSER_EXCHANGE=application-events
      - CVPARSER_QUEUE=cv-parser-queue
      - CVPARSER_DLX=cv-parser-dlx
      - CVPARSER_DLQ=cv-parser-dlq
    depends_on:
      rabbitmq:
        condition: service_healthy

  notification-worker:
    build:
      context: ./backend/src/workers
      dockerfile: NotificationWorker/Dockerfile
    container_name: notification-worker
    environment:
      - RABBITMQ__HOST=rabbitmq
      - RABBITMQ__PORT=5672
      - NOTIFICATION_EXCHANGE=application-events
      - NOTIFICATION_QUEUE=notification-queue
      - NOTIFICATION_DLX=notification-dlx
      - NOTIFICATION_DLQ=notification-dlq
    depends_on:
      rabbitmq:
        condition: service_healthy

volumes:
  mongo-data:
  pg-data:

networks:
  default:
    name: my-ats-network

# Notes:
# - This compose file is a development skeleton. For production, pin images, set proper secrets, and use orchestrators.
