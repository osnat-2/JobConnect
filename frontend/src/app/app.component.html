<div class="app-container">
  <header>
    <div class="brand">
      <div class="brand-logo">
        <span class="logo-mark" aria-hidden="true">
          <svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" focusable="false">
            <defs>
              <linearGradient id="logoGradient" x1="8" y1="8" x2="56" y2="56" gradientUnits="userSpaceOnUse">
                <stop stop-color="#06b6d4" />
                <stop offset="1" stop-color="#0f766e" />
              </linearGradient>
            </defs>
            <rect x="8" y="8" width="48" height="48" rx="14" fill="url(#logoGradient)" />
            <path d="M20 28h12a8 8 0 0 1 0 16H24" stroke="#fff" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" />
            <path d="M28 20v24" stroke="#fff" stroke-width="5" stroke-linecap="round" />
            <path d="M34 32l8-8" stroke="#fff" stroke-width="5" stroke-linecap="round" />
            <path d="M34 32l8 8" stroke="#fff" stroke-width="5" stroke-linecap="round" />
          </svg>
        </span>
        <div class="brand-copy">
          <h1>{{ title }}</h1>
          <p class="brand-tagline">Streamline hiring with one connected applicant tracking dashboard.</p>
        </div>
      </div>
    </div>

    <nav *ngIf="isAuthenticated" class="main-nav">
      <div class="nav-links">
        <a routerLink="/jobs" routerLinkActive="active">Jobs</a>
        <a routerLink="/applications" routerLinkActive="active">Applications</a>
        <a *ngIf="isManager" routerLink="/candidates" routerLinkActive="active">Candidates</a>
      </div>

      <div class="nav-actions">
        <div class="user-info">
          <span class="user-avatar" aria-hidden="true">{{ username ? username.charAt(0) : 'G' }}</span>
          <div class="user-meta">
            <span class="user-name">{{ username || 'Guest' }}</span>
            <span class="user-roles">{{ roles.length ? roles.join(', ') : 'Guest' }}</span>
          </div>
        </div>
        <button class="logout-button" (click)="logout()">Logout</button>
      </div>
    </nav>
  </header>

  <main>
    <router-outlet></router-outlet>
  </main>

  <footer>
    <p>&copy; 2026 JobConnect. All rights reserved.</p>
  </footer>
</div>
